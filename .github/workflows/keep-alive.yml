name: Keep Alive

on:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping ClauseGuard
        run: |
          STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" https://slotai.streamlit.app)

          echo $STATUS

          if [ "$STATUS" = "200" ] || [ "$STATUS" = "303" ]; then
            exit 0
          else
            exit 1
          fi
